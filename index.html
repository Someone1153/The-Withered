<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>The Withered</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="overlay"></div>

    <main class="conteudo-principal">
        <h1 class="titulo-site">The Withered</h1>
        
        <div class="bloco-inferior">
            <p id="frase-efeito">Carregando citação...</p>
            <button id="botao-login">Entrar com o Discord</button>
        </div>
    </main>

    <script>
        // ===== VARIÁVEIS GLOBAIS =====
        const SUPABASE_URL = "https://zkdfzxlwpedhoblrsjdr.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprZGZ6eGx3cGVkaG9ibHJzamRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDMxNTIsImV4cCI6MjA5NjY3OTE1Mn0.vJIxWeEOUymBp8ySeGS0vM9FVocABr8ucEmGNodacs4";
        let supabaseClient = null;

        // ===== CITAÇÕES =====
        const citacoes = [
            "Até mesmo as cinzas têm histórias sobre o fogo que costumavam ser.",
            "O silêncio do que murchou ecoa mais forte do que o clamor do que tenta crescer.",
            "As sombras mais densas pertencem àqueles que já carregaram a luz mais brilhante.",
            "Não tema o inverno da alma; é no solo devastado que os segredos mais antigos se escondem.",
            "O tempo consome a carne, mas imortaliza a ruína.",
            "Sob as folhas secas do passado, repousa aquilo que nunca pôde ser destruído.",
            "Há uma beleza esquecida no que definha longe dos olhos do mundo.",
            "Resta muito pouco de nós além das memórias que o vento se recusa a levar.",
            "Quando a última pétala cair, restará apenas a verdade imutável do que fomos.",
            "Nascidos do declínio, moldados pela ausência... nós resistimos."
        ];

        // ===== AGUARDAR SUPABASE CARREGAR =====
        async function aguardarSupabase(maxTentativas = 30) {
            for (let i = 0; i < maxTentativas; i++) {
                if (window.Supabase) {
                    console.log("✓ Supabase carregou após " + (i * 100) + "ms");
                    return true;
                }
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            console.error("✗ Supabase não carregou após 3 segundos");
            return false;
        }

        // ===== INICIALIZAÇÃO DO SUPABASE =====
        async function inicializarSupabase() {
            try {
                // Aguarda Supabase estar disponível
                if (!await aguardarSupabase()) {
                    console.error("✗ Supabase library não está disponível");
                    return false;
                }
                
                supabaseClient = window.Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log("✓ Supabase inicializado com sucesso");
                return true;
            } catch (err) {
                console.error("✗ Erro ao inicializar Supabase:", err);
                return false;
            }
        }

        // ===== FUNÇÃO DE LOGIN =====
        async function fazerLogin() {
            console.log("▶ Clicou no botão de login");
            
            if (!supabaseClient) {
                console.error("✗ Supabase não está inicializado");
                alert("Erro: Supabase não está pronto. Tente recarregar a página.");
                return;
            }

            try {
                console.log("▶ Iniciando fluxo OAuth com Discord...");
                
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'discord',
                    options: {
                        redirectTo: 'https://someone1153.github.io/The-Withered/'
                    }
                });

                if (error) {
                    console.error("✗ Erro OAuth:", error);
                    alert("Erro ao conectar com Discord:\n" + error.message);
                } else {
                    console.log("✓ OAuth iniciado, aguardando redirecionamento...");
                }
            } catch (err) {
                console.error("✗ Erro na função de login:", err);
                alert("Erro: " + err.message);
            }
        }

        // ===== EXIBIR CITAÇÃO ALEATÓRIA =====
        function exibirCitacao() {
            const citacao = citacoes[Math.floor(Math.random() * citacoes.length)];
            const elemento = document.getElementById('frase-efeito');
            if (elemento) {
                elemento.textContent = `"${citacao}"`;
                console.log("✓ Citação exibida");
            }
        }

        // ===== CONECTAR BOTÃO =====
        function conectarBotao() {
            const btn = document.getElementById('botao-login');
            if (!btn) {
                console.error("✗ Botão não encontrado no DOM");
                return;
            }
            
            btn.addEventListener('click', fazerLogin);
            console.log("✓ Botão conectado ao evento de click");
        }

        // ===== VERIFICAR SESSÃO =====
        async function verificarSessao() {
            if (!supabaseClient) {
                console.error("✗ Supabase não está inicializado");
                return;
            }

            try {
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (error) {
                    console.error("✗ Erro ao obter sessão:", error);
                    return;
                }

                if (session && session.user) {
                    console.log("✓ Sessão ativa, redirecionando para home...");
                    window.location.href = 'https://someone1153.github.io/The-Withered/home.html';
                } else {
                    console.log("▶ Nenhuma sessão ativa");
                }
            } catch (err) {
                console.error("✗ Erro ao verificar sessão:", err);
            }
        }

        // ===== CARREGAR A PÁGINA =====
        document.addEventListener('DOMContentLoaded', async function() {
            console.log("=== INICIANDO THE WITHERED ===");
            
            // 1. Inicializar Supabase
            if (!await inicializarSupabase()) {
                console.error("✗ Falha ao inicializar Supabase");
                alert("Erro ao carregar o sistema de autenticação. Tente recarregar.");
                return;
            }

            // 2. Aguardar um pouco para Supabase ficar pronto
            await new Promise(resolve => setTimeout(resolve, 500));

            // 3. Verificar se há sessão ativa
            await verificarSessao();

            // 4. Exibir citação
            exibirCitacao();

            // 5. Conectar o botão
            conectarBotao();

            console.log("=== PÁGINA PRONTA ===");
        });

        // Também escuta o evento de restauração de sessão (após OAuth)
        // Aguarda um pouco para Supabase estar disponível antes de usar
        setTimeout(function() {
            if (supabaseClient) {
                supabaseClient.auth.onAuthStateChange((event, session) => {
                    console.log("▶ Evento de autenticação:", event);
                    if (event === 'SIGNED_IN' && session) {
                        console.log("✓ Usuário autenticado, redirecionando...");
                        window.location.href = 'https://someone1153.github.io/The-Withered/home.html';
                    }
                });
            }
        }, 1000);
    </script>
</body>
</html>
