<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>The Withered</title>
    <link rel="stylesheet" href="style.css">
    <!-- Carregar Supabase de múltiplas formas para garantir -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.2/dist/main.umd.js"></script>
    <script>
        // Verificar se Supabase carregou
        console.log("▶ Verificando se Supabase foi carregado...");
        
        // Se não carregar em 2 segundos, tenta outra fonte
        setTimeout(function() {
            if (window.supabase) {
                console.log("✓ Supabase (minúsculo) está disponível!");
                window.Supabase = window.supabase;
            } else if (window.Supabase) {
                console.log("✓ Supabase (maiúsculo) está disponível!");
            } else {
                console.error("✗ Supabase NÃO foi carregado, tentando alternativa...");
                var script = document.createElement('script');
                script.src = 'https://unpkg.com/@supabase/supabase-js@2/dist/main.umd.js';
                script.onload = function() {
                    console.log("✓ Supabase carregado via unpkg!");
                    if (window.supabase && !window.Supabase) {
                        window.Supabase = window.supabase;
                    }
                };
                script.onerror = function() {
                    console.error("✗ Falha ao carregar de unpkg também");
                };
                document.head.appendChild(script);
            }
        }, 2000);
    </script></head>
<body>
    <div class="overlay"></div>

    <main class="conteudo-principal">
        <h1 class="titulo-site">The Withered</h1>
        
        <div class="bloco-inferior">
            <p id="frase-efeito">Carregando citação...</p>
            <button id="botao-login">Entrar com o Discord</button>
        </div>
    </main>

    <script>
        console.log("🚀 Script iniciado!");

        // CONFIGURAÇÕES
        const SUPABASE_URL = "https://zkdfzxlwpedhoblrsjdr.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprZGZ6eGx3cGVkaG9ibHJzamRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDMxNTIsImV4cCI6MjA5NjY3OTE1Mn0.vJIxWeEOUymBp8ySeGS0vM9FVocABr8ucEmGNodacs4";
        let supabaseClient = null;

        // CITAÇÕES
        const citacoes = [
            "Até mesmo as cinzas têm histórias sobre o fogo que costumavam ser.",
            "O silêncio do que murchou ecoa mais forte do que o clamor do que tenta crescer.",
            "As sombras mais densas pertencem àqueles que já carregaram a luz mais brilhante.",
            "Não tema o inverno da alma; é no solo devastado que os segredos mais antigos se escondem.",
            "O tempo consome a carne, mas imortaliza a ruína.",
            "Sob as folhas secas do passado, repousa aquilo que nunca pôde ser destruído.",
            "Há uma beleza esquecida no que definha longe dos olhos do mundo.",
            "Resta muito pouco de nós além das memórias que o vento se recusa a levar.",
            "Quando a última pétala cair, restará apenas a verdade imutável do que fomos.",
            "Nascidos do declínio, moldados pela ausência... nós resistimos."
        ];

        // EXIBIR CITAÇÃO
        function exibirCitacao() {
            const citacao = citacoes[Math.floor(Math.random() * citacoes.length)];
            document.getElementById('frase-efeito').textContent = `"${citacao}"`;
            console.log("✓ Citação exibida");
        }

        // CONECTAR BOTÃO
        function conectarBotao() {
            document.getElementById('botao-login').addEventListener('click', async function() {
                console.log("▶ Clicou no botão de login");
                console.log("Estado do Supabase:", {
                    supabaseClient: !!supabaseClient,
                    windowSupabase: !!window.Supabase,
                    windowsupabase: !!window.supabase
                });
                
                if (!supabaseClient) {
                    alert("Sistema ainda está carregando. Tente novamente em alguns segundos.");
                    return;
                }

                try {
                    console.log("▶ Iniciando OAuth com Discord");
                    await supabaseClient.auth.signInWithOAuth({
                        provider: 'discord',
                        options: {
                            redirectTo: 'https://someone1153.github.io/The-Withered/'
                        }
                    });
                    console.log("✓ OAuth iniciado!");
                } catch (err) {
                    console.error("✗ Erro no OAuth:", err);
                    alert("Erro: " + err.message);
                }
            });
            console.log("✓ Botão conectado");
        }

        // INICIALIZAR SUPABASE
        async function inicializarSupabase() {
            for (let i = 0; i < 50; i++) {
                // Verificar ambas as variações (maiúsculo e minúsculo)
                const supabaseLib = window.Supabase || window.supabase;
                
                if (supabaseLib && supabaseLib.createClient) {
                    // Garantir que Supabase (maiúsculo) existe
                    if (!window.Supabase) {
                        window.Supabase = supabaseLib;
                    }
                    
                    supabaseClient = window.Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    console.log("✓ Supabase inicializado com sucesso!");
                    return;
                }
                await new Promise(r => setTimeout(r, 100));
            }
            console.error("✗ Supabase não carregou após 5 segundos");
        }

        // EXECUTAR TUDO AGORA
        console.log("🚀 === INICIANDO THE WITHERED === 🚀");
        
        exibirCitacao();
        conectarBotao();
        inicializarSupabase();

        console.log("✓ === PÁGINA PRONTA ===");
    </script>
</body>
</html>
