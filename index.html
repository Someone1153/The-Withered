<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>The Withered</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <main class="conteudo-principal">
        <h1 class="titulo-site">The Withered</h1>
        
        <div class="bloco-inferior">
            <p id="frase-efeito">Carregando citação...</p>
            <button id="botao-login">Entrar com o Discord</button>
        </div>
    </main>

    <script type="module">
        console.log("🚀 === INICIANDO THE WITHERED ===");

        // CONFIGURAÇÕES
        const SUPABASE_URL = "https://zkdfzxlwpedhoblrsjdr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_XrlHqqACgEz_OqAHyVIVag_wC55nwsB";
        let supabaseClient = null;

        // CITAÇÕES
        const citacoes = [
            "Até mesmo as cinzas têm histórias sobre o fogo que costumavam ser.",
            "O silêncio do que murchou ecoa mais forte do que o clamor do que tenta crescer.",
            "As sombras mais densas pertencem àqueles que já carregaram a luz mais brilhante.",
            "Não tema o inverno da alma; é no solo devastado que os segredos mais antigos se escondem.",
            "O tempo consome a carne, mas imortaliza a ruína.",
            "Sob as folhas secas do passado, repousa aquilo que nunca pôde ser destruído.",
            "Há uma beleza esquecida no que definha longe dos olhos do mundo.",
            "Resta muito pouco de nós além das memórias que o vento se recusa a levar.",
            "Quando a última pétala cair, restará apenas a verdade imutável do que fomos.",
            "Nascidos do declínio, moldados pela ausência... nós resistimos."
        ];

        // ===== FUNÇÕES =====
        function exibirCitacao() {
            const citacao = citacoes[Math.floor(Math.random() * citacoes.length)];
            document.getElementById('frase-efeito').textContent = `"${citacao}"`;
            console.log("✓ Citação exibida");
        }

        function conectarBotao() {
            const btn = document.getElementById('botao-login');
            btn.addEventListener('click', async function() {
                console.log("▶ Clicou no botão");
                console.log("supabaseClient existe?", !!supabaseClient);
                
                if (!supabaseClient) {
                    console.warn("⚠ Supabase ainda não está pronto");
                    alert("Sistema ainda está carregando. Tente novamente em alguns segundos.");
                    return;
                }

                try {
                    console.log("▶ Iniciando login OAuth com Discord");
                    console.log("Chamando signInWithOAuth...");
                    
                    const result = await supabaseClient.auth.signInWithOAuth({
                        provider: 'discord',
                        options: {
                            redirectTo: 'https://someone1153.github.io/The-Withered/home'
                        }
                    });
                    
                    console.log("✓ Resultado do OAuth:", result);
                    console.log("✓ OAuth iniciado, aguardando redirecionamento...");
                } catch (err) {
                    console.error("✗ Erro na função de login:", err);
                    alert("Erro: " + err.message);
                }
            });
            console.log("✓ Botão conectado");
        }

        async function inicializarSupabase() {
            try {
                console.log("▶ Carregando Supabase via ESM...");
                
                // Carregar Supabase usando import dinâmico (ESM)
                const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.2/+esm');
                
                console.log("✓ Supabase JS carregado!");
                
                // Criar cliente Supabase
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                console.log("✓ Supabase cliente inicializado com sucesso!");
                console.log("supabaseClient:", supabaseClient);
                
                return true;
            } catch (err) {
                console.error("✗ Erro ao carregar Supabase:", err);
                console.error("Detalhes do erro:", err.message, err.stack);
                return false;
            }
        }

        // ===== EXECUTAR INICIALIZAÇÃO =====
        // 1. Exibir citação imediatamente
        exibirCitacao();

        // 2. Conectar botão imediatamente
        conectarBotao();

        // 3. Inicializar Supabase
        console.log("▶ Iniciando Supabase...");
        inicializarSupabase().then(ok => {
            if (ok) {
                console.log("✓✓✓ SUPABASE PRONTO! ✓✓✓");
                console.log("Você já pode clicar no botão de login");
                
                // VERIFICAR SE JÁ ESTÁ LOGADO
                verificarSessao();
            } else {
                console.error("✗✗✗ FALHA AO CARREGAR SUPABASE ✗✗✗");
                alert("ERRO: Supabase não conseguiu carregar. Verifique a conexão de internet e tente recarregar a página.");
            }
        });

        async function verificarSessao() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (session) {
                    console.log("✓ Usuário já autenticado! Redirecionando para home.html");
                    console.log("Usuário:", session.user.user_metadata);
                    window.location.href = 'https://someone1153.github.io/The-Withered/home.html';
                } else {
                    console.log("✓ Nenhum usuário autenticado ainda");
                }
            } catch (err) {
                console.error("✗ Erro ao verificar sessão:", err);
            }
        }

        console.log("✓ === PÁGINA PRONTA ===");
    </script>
</body>
</html>
