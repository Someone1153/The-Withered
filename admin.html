<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - The Withered</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="corpo-painel">
    <div class="container-painel">
        <aside class="sidebar">
            <div class="logo-sidebar">Admin Panel</div>
            <a href="home.html" class="item-menu">Voltar ao Painel</a>
        </aside>
        
        <main class="conteudo-painel">
            <div class="caixa-conteudo">
                <h2>Painel Administrativo</h2>
                <div id="grid-formularios" style="display: grid; gap: 10px; margin-top: 20px;">
                    </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.2/+esm';

        const SUPABASE_URL = "https://zkdfzxlwpedhoblrsjdr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_XrlHqqACgEz_OqAHyVIVag_wC55nwsB";
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const admins = ["780382546542198816"];

        function getDiscordCandidates(session) {
            const user = session?.user;
            if (!user) return [];

            const candidates = new Set();
            if (user.user_metadata?.provider_id) candidates.add(user.user_metadata.provider_id);
            if (user.user_metadata?.sub) candidates.add(user.user_metadata.sub);
            if (user.id) candidates.add(user.id);

            if (Array.isArray(user.identities)) {
                user.identities.forEach(identity => {
                    if (identity?.provider === 'discord' && identity?.identity_data?.id) {
                        candidates.add(identity.identity_data.id);
                    }
                    if (identity?.identity_data) {
                        Object.values(identity.identity_data).forEach(value => {
                            if (typeof value === 'string') candidates.add(value);
                        });
                    }
                });
            }

            return Array.from(candidates).filter(Boolean);
        }

        window.onload = async function() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (!session || !session.user) {
                    alert("Você não está autenticado!");
                    window.location.href = "index.html";
                    return;
                }

                const discordCandidates = getDiscordCandidates(session);
                console.log('IDs detectados para admin:', discordCandidates);

                const isAdmin = discordCandidates.some(id => admins.includes(id));
                if (!isAdmin) {
                    const container = document.getElementById('grid-formularios');
                    container.innerHTML = '<p class="admin-error">Acesso Negado! Você não possui permissão administrativa.</p>';
                    console.warn('Acesso admin negado para IDs:', discordCandidates);
                    return;
                }

                await carregarFormularios();
            } catch (err) {
                console.error("Erro ao verificar permissões:", err);
                window.location.href = "index.html";
            }
        };

        async function carregarFormularios() {
            const container = document.getElementById('grid-formularios');
            container.innerHTML = '<p class="admin-loading">Carregando formulários...</p>';

            const { data, error } = await supabaseClient
                .from('formulario_players')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Erro ao buscar formulários no Supabase:', error);
                container.innerHTML = '<p class="admin-error">Erro ao carregar formulários. Tente novamente mais tarde.</p>';
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = '<p>Nenhum formulário recebido ainda.</p>';
                return;
            }

            container.innerHTML = data.map(form => {
                const preferencias = Array.isArray(form.preferencias_jogo)
                    ? form.preferencias_jogo.join(' • ')
                    : (form.preferencias_jogo || 'Sem preferência definida');

                const dataEnvio = form.created_at
                    ? new Date(form.created_at).toLocaleString('pt-BR')
                    : 'Data não informada';

                return `
                    <article class="admin-card">
                        <header class="admin-card-header">
                            <div>
                                <h3 class="admin-card-title">${form.nome_apelido || 'Sem nome'}</h3>
                                <p class="admin-card-meta">${form.pronomes || 'Sem pronomes'} • ${dataEnvio}</p>
                            </div>
                            <span class="admin-card-badge">${form.status || 'Em análise'}</span>
                        </header>

                        <div class="admin-card-grid">
                            <div class="admin-card-field"><strong>Idade / Nascimento</strong><p>${form.idade_data_nascimento || '-'}</p></div>
                            <div class="admin-card-field"><strong>Disponibilidade</strong><p>${form.disponibilidade_horarios || '-'}</p></div>
                            <div class="admin-card-field"><strong>Por que aprovar</strong><p>${form.por_que_aprovar || '-'}</p></div>
                            <div class="admin-card-field"><strong>Regra mais importante</strong><p>${form.regra_mais_importante || '-'}</p></div>
                            <div class="admin-card-field"><strong>Preferências</strong><p>${preferencias}</p></div>
                            <div class="admin-card-field"><strong>Meio de divulgação</strong><p>${form.meio_divulgacao || '-'}</p></div>
                            <div class="admin-card-field admin-card-field-full"><strong>Anti-RP</strong><p>${form.definicao_anti_rp || '-'}</p></div>
                            <div class="admin-card-field admin-card-field-full"><strong>Metagaming</strong><p>${form.definicao_metagaming || '-'}</p></div>
                            <div class="admin-card-field admin-card-field-full"><strong>HardRP</strong><p>${form.definicao_hard_rp || '-'}</p></div>
                            <div class="admin-card-field admin-card-field-full"><strong>Personagem</strong><p>${form.personagem_nome_idade || '-'}</p></div>
                            <div class="admin-card-field admin-card-field-full"><strong>História</strong><p>${form.personagem_historia || '-'}</p></div>
                            <div class="admin-card-field"><strong>Gostos / Odie</strong><p>${form.personagem_gostos || '-'}</p></div>
                            <div class="admin-card-field"><strong>Medos</strong><p>${form.personagem_medos || '-'}</p></div>
                            <div class="admin-card-field admin-card-field-full"><strong>Personalidade</strong><p>${form.personagem_personalidade || '-'}</p></div>
                        </div>
                    </article>
                `;
            }).join('');
        }
    </script>
</body>
</html>
