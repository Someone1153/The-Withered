<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - The Withered</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="corpo-painel">
    <div class="container-painel">
        <aside class="sidebar">
            <div class="logo-sidebar">Admin Panel</div>
            <a href="home.html" class="item-menu">Voltar ao Painel</a>
        </aside>
        
        <main class="conteudo-painel">
            <div class="caixa-conteudo">
                <h2>Painel Administrativo</h2>
                <div id="colunas-formularios" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px;">
                    <div class="coluna-formularios" id="col-players">
                        <h3 style="margin-bottom:10px">Players</h3>
                        <div id="lista-players"></div>
                    </div>
                    <div class="coluna-formularios" id="col-staff">
                        <h3 style="margin-bottom:10px">Staff</h3>
                        <div id="lista-staff"></div>
                    </div>
                    <div class="coluna-formularios" id="col-criancas">
                        <h3 style="margin-bottom:10px">Crianças</h3>
                        <div id="lista-criancas"></div>
                    </div>
                </div>

                <div id="modal-admin-form" class="modal-formulario">
                    <button type="button" class="modal-close-outside" onclick="fecharModalAdmin()">×</button>
                    <div class="modal-conteudo-formulario admin-modal-conteudo">
                        <h3 class="modal-titulo">Formulário</h3>
                        <div id="modal-admin-conteudo" class="modal-formulario-conteudo"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.2/+esm';

        const SUPABASE_URL = "https://zkdfzxlwpedhoblrsjdr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_XrlHqqACgEz_OqAHyVIVag_wC55nwsB";
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const admins = ["780382546542198816"];

        function getDiscordCandidates(session) {
            const user = session?.user;
            if (!user) return [];

            const candidates = new Set();
            if (user.user_metadata?.provider_id) candidates.add(user.user_metadata.provider_id);
            if (user.user_metadata?.sub) candidates.add(user.user_metadata.sub);
            if (user.id) candidates.add(user.id);

            if (Array.isArray(user.identities)) {
                user.identities.forEach(identity => {
                    if (identity?.provider === 'discord' && identity?.identity_data?.id) {
                        candidates.add(identity.identity_data.id);
                    }
                    if (identity?.identity_data) {
                        Object.values(identity.identity_data).forEach(value => {
                            if (typeof value === 'string') candidates.add(value);
                        });
                    }
                });
            }

            return Array.from(candidates).filter(Boolean);
        }

        window.onload = async function() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (!session || !session.user) {
                    alert("Você não está autenticado!");
                    window.location.href = "index.html";
                    return;
                }

                const discordCandidates = getDiscordCandidates(session);
                console.log('IDs detectados para admin:', discordCandidates);

                const isAdmin = discordCandidates.some(id => admins.includes(id));
                if (!isAdmin) {
                    alert("Acesso negado. Você não possui permissão administrativa.");
                    console.warn('Acesso admin negado para IDs:', discordCandidates);
                    window.location.href = "index.html";
                    return;
                }

                await carregarFormularios();
            } catch (err) {
                console.error("Erro ao verificar permissões:", err);
                window.location.href = "index.html";
            }
        };

        window.fazerLogout = async function(event) {
            if (event && event.preventDefault) {
                event.preventDefault();
            }

            try {
                const { error } = await supabaseClient.auth.signOut();
                if (error) {
                    console.error('Erro ao deslogar:', error);
                }
            } catch (err) {
                console.error('Erro ao deslogar:', err);
            }

            window.location.href = 'index.html';
        };

        function abrirModalAdmin(form) {
            const modal = document.getElementById('modal-admin-form');
            const content = document.getElementById('modal-admin-conteudo');
            if (!modal || !content) return;

            // build ordered view similar to home.verFormulario
            const fieldsOrder = [
                { label: 'Como deseja que a Staff te chame? (nome ou apelido)', key: 'nome_apelido' },
                { label: 'Quais seus pronomes?', key: 'pronomes' },
                { label: 'Quantos anos você tem? | (ddmmaaaa)', key: 'idade_data_nascimento' },
                { label: 'Quais dias você estará disponível para jogar? Em quais horários?', key: 'disponibilidade_horarios' },
                { label: 'Por que deveríamos te aprovar?', key: 'por_que_aprovar' },
                { label: 'Cite a regra do servidor que você considera mais importante e o porquê    ', key: 'regra_mais_importante' },
                { label: 'Quais suas Preferências?', key: 'preferencias_jogo' },
                { label: 'Você teria algum meio de divulgar o servidor? Se sim, qual?', key: 'meio_divulgacao' },
                { label: 'Dite com suas palavras o que é Anti-RP', key: 'definicao_anti_rp' },
                { label: 'Dite com suas palavras o que é Metagaming', key: 'definicao_metagaming' },
                { label: 'Dite com suas palavras o que é HardRP', key: 'definicao_hard_rp' },
                { label: 'Qual o nome e idade do seu personagem? E qual o significado do nome dele?', key: 'personagem_nome_idade' },
                { label: 'Qual a história do seu personagem?', key: 'personagem_historia' },
                { label: 'Do que seu personagem mais gosta? | E do que odeia?', key: 'personagem_gostos' },
                { label: 'Quais os medos do seu personagem?', key: 'personagem_medos' },
                { label: 'Qual a personalidade do seu personagem?', key: 'personagem_personalidade' }
            ];

            let html = '';
            html += `<div class="modal-row"><strong>Tipo</strong><div>${form.tipo || '-'}</div></div>`;
            html += `<div class="modal-row"><strong>Status</strong><div>${form.status || '-'}</div></div>`;
            html += `<div class="modal-row"><strong>Enviado em</strong><div>${form.created_at ? new Date(form.created_at).toLocaleString('pt-BR') : '-'}</div></div>`;

            function getRespostaAdmin(formulario, key) {
                const directValue = formulario[key] ?? formulario.raw_payload?.[key];
                if (directValue !== undefined && directValue !== null && directValue !== '') {
                    return directValue;
                }

                if (Array.isArray(formulario.respostas)) {
                    const item = formulario.respostas.find(r => {
                        const pergunta = (r.pergunta || '').trim().toLowerCase();
                        return pergunta.includes(key.replace(/_/g, ' '))
                            || key.replace(/_/g, ' ').includes(pergunta)
                            || (pergunta.includes('por que') && key === 'por_que_aprovar')
                            || (pergunta.includes('regra') && key === 'regra_mais_importante')
                            || (pergunta.includes('pronomes') && key === 'pronomes')
                            || (pergunta.includes('disponibilidade') && key === 'disponibilidade_horarios');
                    });
                    if (item) {
                        return item.resposta ?? item.answer ?? item.value ?? directValue;
                    }
                }

                return directValue;
            }

            function formatValueForDisplayAdmin(val) {
                if (val === undefined || val === null) return '-';
                if (typeof val === 'string') {
                    const s = val.trim();
                    if (s === '' || s.toLowerCase() === 'null') return '-';
                    return s;
                }
                if (Array.isArray(val)) {
                    if (val.length === 0) return '-';
                    return val.map(v => (v === null || v === undefined) ? '-' : String(v)).join(' • ');
                }
                if (typeof val === 'object') {
                    try { return JSON.stringify(val); } catch (e) { return '-'; }
                }
                return String(val);
            }

            fieldsOrder.forEach(f => {
                const value = getRespostaAdmin(form, f.key);
                const disp = formatValueForDisplayAdmin(value);
                html += `<div class="modal-row"><strong>${f.label}</strong><div>${disp}</div></div>`;
            });

            if (Array.isArray(form.respostas) && form.respostas.length > 0) {
                html += `<div class="modal-row"><strong>Respostas adicionais</strong></div>`;
                form.respostas.forEach(item => {
                    const pergunta = item.pergunta || 'Pergunta';
                    const resposta = item.resposta || '-';
                    html += `<div class="modal-row"><strong>${pergunta}</strong><div>${resposta}</div></div>`;
                });
            }

            content.innerHTML = html;
            modal.classList.add('modal-aberto');
        }

        function fecharModalAdmin() {
            const modal = document.getElementById('modal-admin-form');
            if (!modal) return;
            modal.classList.remove('modal-aberto');
        }

        async function carregarFormularios() {
            const listaPlayers = document.getElementById('lista-players');
            const listaStaff = document.getElementById('lista-staff');
            const listaCriancas = document.getElementById('lista-criancas');

            listaPlayers.innerHTML = '<p class="admin-loading">Carregando...</p>';
            listaStaff.innerHTML = '';
            listaCriancas.innerHTML = '';

            const { data, error } = await supabaseClient
                .from('formulario_players')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                console.error('Erro ao buscar formulários no Supabase:', error);
                listaPlayers.innerHTML = '<p class="admin-error">Erro ao carregar formulários. Tente novamente mais tarde.</p>';
                return;
            }

            if (!data || data.length === 0) {
                listaPlayers.innerHTML = '<p>Nenhum formulário recebido ainda.</p>';
                return;
            }

            // agrupar por tipo e numerar por grupo
            const players = [];
            const staff = [];
            const criancas = [];

            data.forEach(item => {
                const tipo = (item.tipo || '').toString().toLowerCase();
                if (tipo.includes('staff')) staff.push(item);
                else if (tipo.includes('crian')) criancas.push(item);
                else players.push(item);
            });

            function renderList(container, items, prefix) {
                if (!container) return;
                if (!items || items.length === 0) {
                    container.innerHTML = '<p class="texto-vazio">Nenhum formulário nesta categoria.</p>';
                    return;
                }

                container.innerHTML = '';
                items.forEach((form, idx) => {
                    const numero = idx + 1;
                    const dataEnvio = form.created_at ? new Date(form.created_at).toLocaleString('pt-BR') : 'Data não informada';
                    const nome = form.nome_apelido || form.tag || 'Sem nome';

                    const row = document.createElement('div');
                    row.className = 'admin-compact-row';
                    row.style = 'display:flex;align-items:center;gap:12px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;';
                    row.innerHTML = `
                        <div style="width:40px;font-weight:700;color:#c8d2ff">${numero}</div>
                        <div style="flex:1;color:#fff">${nome}</div>
                        <div style="width:180px;color:#a3a3a3">${dataEnvio}</div>
                    `;
                    row.addEventListener('click', () => abrirModalAdmin(form));
                    container.appendChild(row);
                });
            }

            renderList(listaPlayers, players, 'P');
            renderList(listaStaff, staff, 'S');
            renderList(listaCriancas, criancas, 'C');
        }
    </script>
</body>
</html>
